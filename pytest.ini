[pytest]
asyncio_mode = auto
testpaths = tests
filterwarnings =
    ignore::RuntimeWarning:unittest.mock
markers =
    e2e: end-to-end browser tests (tests/e2e) — boot a real cockpit subprocess with a
        scripted fake engine and drive it via Playwright. Excluded from the default
        run (see addopts below); run explicitly with:
        venv/bin/python -m pytest tests/e2e -m e2e
# spec-072: keep the (slow, browser-dependent) e2e suite out of the default `pytest
# tests/` run. An explicit `-m e2e` on the command line overrides this (argparse
# keeps the last value for a single-valued option), which is how tests/e2e is run.
addopts = -m "not e2e"
