name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # IMPORTANT: tests MUST run via venv/bin/python — pytest-aiohttp lives in
      # the venv, and ~237 endpoint tests error under a bare system interpreter.
      - name: Bootstrap venv
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: env -u WEB_COOKIE_SECURE venv/bin/python -m pytest tests/ -q

      - name: Dependency audit (non-blocking)
        run: |
          venv/bin/pip install pip-audit
          venv/bin/pip-audit --progress-spinner off || true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install + build
        working-directory: web
        run: |
          npm ci
          npm run build
